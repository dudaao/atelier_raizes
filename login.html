<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Entrar | Atelier Raízes</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="container header-content">

            <a href="index.html" class="logo">
                <div class="logo-circle"></div>
                <h1>Atelier Raízes</h1>
            </a>

            <!-- NAVBAR COM LINKS -->

            <nav>
                <a href="canecas.html">Canecas</a>
                <a href="pratos.html">Pratos</a>
                <a href="jarros.html">Jarros</a>
                <a href="#">Outros</a>
                <a href="#">Personalizados</a>
                <a href="index.html#quemSomos">Quem Somos</a>
            </nav>

            <div class="header-buttons">

                <a href="registro.html">
                    <button class="btn btn-primary">
                        Registrar
                    </button>
                </a>

                <a href="login.html">
                    <button class="btn btn-secondary">
                        Entrar
                    </button>
                </a>

            </div>

        </div>
    </header>
    <section class="auth-page">

        <div class="auth-box">

            <a href="index.html" class="logo auth-logo">
                <div class="logo-circle"></div>
                <h1>Atelier Raízes</h1>
            </a>

            <h2>Entrar</h2>

            <p class="auth-subtitle">
                Acesse sua conta para continuar.
            </p>

            <form class="auth-form">

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Digite seu email">
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha">
                </div>

                <button type="submit" class="auth-btn">
                    Entrar
                </button>

            </form>

            <p class="auth-switch">
                Não possui conta?
                <a href="registro.html">Registrar-se</a>
            </p>

        </div>

    </section>

</body>

</html>
